services:
  db:
    image: postgres:16-alpine
    container_name: todo-smoke-db

    environment:
      POSTGRES_DB: ${TODO_DB_NAME:-todo}
      POSTGRES_USER: ${TODO_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TODO_DB_PASSWORD:-postgres}

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: ${APP_IMAGE:-todo-smoke-placeholder:latest}
    container_name: todo-smoke-app

    depends_on:
      db:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: prod
      TODO_APP_SERVER_PORT: 8080
      TODO_APP_NAME: ${TODO_APP_NAME:-todo-web-app}
      TODO_DB_HOST: db
      TODO_DB_PORT: 5432
      TODO_DB_NAME: ${TODO_DB_NAME:-todo}
      TODO_DB_USERNAME: ${TODO_DB_USERNAME:-postgres}
      TODO_DB_PASSWORD: ${TODO_DB_PASSWORD:-postgres}

    ports:
      - "18080:8080"
