name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/todo-devops

jobs:
  build-and-verify:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Docker Compose file
        run: docker compose -f compose.yaml config -q

      - name: Validate smoke Compose file
        run: docker compose -f compose.smoke.yaml config -q

      - name: Build project with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-web-app-jar
          path: apps/web-app/build/libs/*.jar
          if-no-files-found: error

  docker-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-verify
    outputs:
      smoke_image: ${{ format('{0}:sha-{1}', env.IMAGE_NAME, github.sha) }}
      image_digest_ref: ${{ github.event_name != 'pull_request' && format('{0}@{1}', env.IMAGE_NAME, steps.docker_build.outputs.digest) || '' }}
      image_digest: ${{ github.event_name != 'pull_request' && steps.docker_build.outputs.digest || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=todo-devops
            org.opencontainers.image.description=ToDo-DevOps application
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Check GitHub Container Registry availability
        if: github.event_name != 'pull_request'
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        if: github.event_name != 'pull_request'
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Build and optionally push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Persist published image metadata
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p build/ci
          cat > build/ci/published-image-metadata.json <<EOF
          {
            "repository": "${{ github.repository }}",
            "run_id": "${{ github.run_id }}",
            "run_attempt": "${{ github.run_attempt }}",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "image_name": "${{ env.IMAGE_NAME }}",
            "smoke_image": "${{ format('{0}:sha-{1}', env.IMAGE_NAME, github.sha) }}",
            "image_digest": "${{ steps.docker_build.outputs.digest }}",
            "image_digest_ref": "${{ format('{0}@{1}', env.IMAGE_NAME, steps.docker_build.outputs.digest) }}"
          }
          EOF

      - name: Upload published image metadata artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: published-image-metadata
          path: build/ci/published-image-metadata.json
          if-no-files-found: error

  smoke-test-image:
    name: Smoke test published image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Start smoke stack from published image
        env:
          APP_IMAGE: ${{ needs.docker-image.outputs.smoke_image }}
        run: docker compose -f compose.smoke.yaml up -d --wait --wait-timeout 120

      - name: Check readiness endpoint
        run: curl --fail --retry 20 --retry-delay 3 http://localhost:18080/actuator/health/readiness

      - name: Check users endpoint
        run: curl --fail http://localhost:18080/api/users

      - name: Dump smoke stack logs on failure
        if: failure()
        run: docker compose -f compose.smoke.yaml logs --no-color

      - name: Stop smoke stack
        if: always()
        run: docker compose -f compose.smoke.yaml down -v

  security-scan-image:
    name: Scan published image and generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Install safe Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ !cancelled() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: cyclonedx
          output: trivy-image-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sbom
          path: trivy-image-sbom.cdx.json
          if-no-files-found: error

      - name: Fail pipeline on Trivy vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  sign-image:
    name: Sign published image with Cosign
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - docker-image
      - smoke-test-image
      - security-scan-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.6'

      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Sign published image by digest
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ needs.docker-image.outputs.image_digest_ref }}
        run: cosign sign "${IMAGE_REF}"

  verify-signed-image:
    name: Verify Cosign signature
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - sign-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.6'

      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Verify signature from this repository workflow
        env:
          IMAGE_REF: ${{ needs.docker-image.outputs.image_digest_ref }}
        run: |
          cosign verify "${IMAGE_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github\\.com/${{ github.repository }}/\\.github/workflows/ci\\.yaml@.*$"

  attest-image-provenance:
    name: Attest image build provenance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - smoke-test-image
      - security-scan-image
      - sign-image
      - verify-signed-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Generate image build provenance attestation
        id: attest
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.docker-image.outputs.image_digest }}
          push-to-registry: true
          create-storage-record: false

      - name: Print attestation URL
        run: |
          echo "Attestation URL: ${{ steps.attest.outputs.attestation-url }}"

  verify-image-provenance:
    name: Verify image provenance attestation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - attest-image-provenance
    if: github.event_name != 'pull_request'

    steps:
      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Verify provenance via GitHub attestation API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_URI: oci://${{ needs.docker-image.outputs.smoke_image }}
          REPOSITORY: ${{ github.repository }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/ci.yaml
          SOURCE_REF: ${{ github.ref }}
        run: |
          gh attestation verify "${IMAGE_URI}" \
            --repo "${REPOSITORY}" \
            --signer-workflow "${SIGNER_WORKFLOW}" \
            --source-ref "${SOURCE_REF}" \
            --deny-self-hosted-runners \
            --format json > provenance-github-api.json

      - name: Verify provenance via OCI registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_URI: oci://${{ needs.docker-image.outputs.smoke_image }}
          REPOSITORY: ${{ github.repository }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/ci.yaml
          SOURCE_REF: ${{ github.ref }}
        run: |
          gh attestation verify "${IMAGE_URI}" \
            --repo "${REPOSITORY}" \
            --signer-workflow "${SIGNER_WORKFLOW}" \
            --source-ref "${SOURCE_REF}" \
            --deny-self-hosted-runners \
            --bundle-from-oci \
            --format json > provenance-oci.json

      - name: Upload provenance verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: provenance-verification
          path: |
            provenance-github-api.json
            provenance-oci.json
          if-no-files-found: error

  attest-image-sbom:
    name: Attest image SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - security-scan-image
      - verify-image-provenance
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: trivy-image-sbom
          path: sbom

      - name: Generate SBOM attestation for image
        id: attest_sbom
        uses: actions/attest@v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.docker-image.outputs.image_digest }}
          sbom-path: sbom/trivy-image-sbom.cdx.json
          push-to-registry: true
          create-storage-record: false

      - name: Print SBOM attestation URL
        run: |
          echo "SBOM attestation URL: ${{ steps.attest_sbom.outputs.attestation-url }}"

  verify-image-sbom-attestation:
    name: Verify image SBOM attestation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - attest-image-sbom
    if: github.event_name != 'pull_request'

    steps:
      - name: Check GitHub Container Registry availability
        run: |
          set +e
          http_code="$(curl -v --connect-timeout 10 --max-time 30 -o /tmp/ghcr-v2-response -w '%{http_code}' https://ghcr.io/v2/)"
          curl_status=$?
          set -e

          if [[ "${curl_status}" -ne 0 ]]; then
            echo "::error::GHCR availability check failed before Docker login: curl exited with ${curl_status}. This usually indicates a timeout, DNS error, or connection error."
            exit 1
          fi

          if [[ "${http_code}" == "401" ]]; then
            echo "GHCR is reachable and returned HTTP 401 as expected for an unauthenticated registry request."
          else
            echo "::warning::GHCR /v2/ returned HTTP ${http_code}; registry was reachable, continuing to authenticated Docker login."
          fi

      - name: Log in to GitHub Container Registry with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        run: |
          set +e
          status=1
          for attempt in 1 2 3; do
            echo "Docker login to ghcr.io attempt ${attempt}/3"
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
            status=$?
            if [[ "${status}" -eq 0 ]]; then
              echo "Docker login to ghcr.io succeeded."
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              sleep_seconds=$((attempt * 10))
              echo "::warning::Docker login to ghcr.io failed with exit code ${status}; retrying in ${sleep_seconds}s."
              sleep "${sleep_seconds}"
            fi
          done

          echo "::error::Docker login to ghcr.io failed after 3 attempts."
          exit "${status}"

      - name: Verify SBOM attestation via GitHub attestation API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_URI: oci://${{ needs.docker-image.outputs.smoke_image }}
          REPOSITORY: ${{ github.repository }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/ci.yaml
          SOURCE_REF: ${{ github.ref }}
          PREDICATE_TYPE: https://cyclonedx.org/bom
        run: |
          gh attestation verify "${IMAGE_URI}" \
            --repo "${REPOSITORY}" \
            --signer-workflow "${SIGNER_WORKFLOW}" \
            --source-ref "${SOURCE_REF}" \
            --deny-self-hosted-runners \
            --predicate-type "${PREDICATE_TYPE}" \
            --format json > sbom-attestation-github-api.json

      - name: Verify SBOM attestation via OCI registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_URI: oci://${{ needs.docker-image.outputs.smoke_image }}
          REPOSITORY: ${{ github.repository }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/ci.yaml
          SOURCE_REF: ${{ github.ref }}
          PREDICATE_TYPE: https://cyclonedx.org/bom
        run: |
          gh attestation verify "${IMAGE_URI}" \
            --repo "${REPOSITORY}" \
            --signer-workflow "${SIGNER_WORKFLOW}" \
            --source-ref "${SOURCE_REF}" \
            --deny-self-hosted-runners \
            --predicate-type "${PREDICATE_TYPE}" \
            --bundle-from-oci \
            --format json > sbom-attestation-oci.json

      - name: Upload SBOM attestation verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-attestation-verification
          path: |
            sbom-attestation-github-api.json
            sbom-attestation-oci.json
          if-no-files-found: error
