name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/todo-devops

jobs:
  build-and-verify:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Docker Compose file
        run: docker compose -f compose.yaml config -q

      - name: Build project with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-web-app-jar
          path: apps/web-app/build/libs/*.jar
          if-no-files-found: error

  docker-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=todo-devops
            org.opencontainers.image.description=ToDo-DevOps application
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}