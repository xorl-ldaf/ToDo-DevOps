name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/todo-devops

jobs:
  build-and-verify:
    name: Build and verify
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Make Gradle Wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Docker Compose file
        run: docker compose -f compose.yaml config -q

      - name: Validate smoke Compose file
        run: docker compose -f compose.smoke.yaml config -q

      - name: Build project with Gradle
        run: ./gradlew clean build --no-daemon

      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-web-app-jar
          path: apps/web-app/build/libs/*.jar
          if-no-files-found: error

  docker-image:
    name: Build and publish image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build-and-verify
    outputs:
      smoke_image: ${{ steps.image_ref.outputs.value }}
      image_digest_ref: ${{ steps.digest_ref.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha
            type=raw,value=sha-${{ github.sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=todo-devops
            org.opencontainers.image.description=ToDo-DevOps application
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Store smoke image reference
        id: image_ref
        run: echo "value=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and optionally push Docker image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Store digest reference for signing
        if: github.event_name != 'pull_request'
        id: digest_ref
        run: echo "value=${IMAGE_NAME}@${{ steps.docker_build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  smoke-test-image:
    name: Smoke test published image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start smoke stack from published image
        env:
          APP_IMAGE: ${{ needs.docker-image.outputs.smoke_image }}
        run: docker compose -f compose.smoke.yaml up -d --wait --wait-timeout 120

      - name: Check readiness endpoint
        run: curl --fail --retry 20 --retry-delay 3 http://localhost:18080/actuator/health/readiness

      - name: Check users endpoint
        run: curl --fail http://localhost:18080/api/users

      - name: Dump smoke stack logs on failure
        if: failure()
        run: docker compose -f compose.smoke.yaml logs --no-color

      - name: Stop smoke stack
        if: always()
        run: docker compose -f compose.smoke.yaml down -v

  security-scan-image:
    name: Scan published image and generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: docker-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install safe Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          version: v0.69.3
          cache: true

      - name: Run Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ !cancelled() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image-scan

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: cyclonedx
          output: trivy-image-sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-sbom
          path: trivy-image-sbom.cdx.json
          if-no-files-found: error

      - name: Fail pipeline on Trivy vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          skip-setup-trivy: true
          image-ref: ${{ needs.docker-image.outputs.smoke_image }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  sign-image:
    name: Sign published image with Cosign
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - docker-image
      - smoke-test-image
      - security-scan-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.6'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign published image by digest
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ needs.docker-image.outputs.image_digest_ref }}
        run: cosign sign "${IMAGE_REF}"

  verify-signed-image:
    name: Verify Cosign signature
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - docker-image
      - sign-image
    if: github.event_name != 'pull_request'

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        with:
          cosign-release: 'v3.0.6'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify signature from this repository workflow
        env:
          IMAGE_REF: ${{ needs.docker-image.outputs.image_digest_ref }}
        run: |
          cosign verify "${IMAGE_REF}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/ci.yml@.*$"