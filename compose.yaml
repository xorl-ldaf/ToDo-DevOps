services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${TODO_DB_NAME:-todo}
      POSTGRES_USER: ${TODO_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${TODO_DB_PASSWORD:-postgres}

    ports:
      - "${TODO_DB_HOST_PORT:-5432}:5432"

    volumes:
      - todo_postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: todo-app
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      TODO_APP_SERVER_PORT: ${TODO_APP_SERVER_PORT:-8080}
      TODO_APP_NAME: ${TODO_APP_NAME:-todo-web-app}
      TODO_DB_HOST: db
      TODO_DB_PORT: 5432
      TODO_DB_NAME: ${TODO_DB_NAME:-todo}
      TODO_DB_USERNAME: ${TODO_DB_USERNAME:-postgres}
      TODO_DB_PASSWORD: ${TODO_DB_PASSWORD:-postgres}

    ports:
      - "${TODO_APP_HOST_PORT:-8080}:${TODO_APP_SERVER_PORT:-8080}"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: todo-prometheus
    restart: unless-stopped

    depends_on:
      app:
        condition: service_started

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - todo_prometheus_data:/prometheus

    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:12.1.1
    container_name: todo-grafana
    restart: unless-stopped

    depends_on:
      prometheus:
        condition: service_started

    environment:
      GF_SECURITY_ADMIN_USER: ${TODO_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${TODO_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"

    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - todo_grafana_data:/var/lib/grafana

    ports:
      - "3000:3000"

volumes:
  todo_postgres_data:
  todo_prometheus_data:
  todo_grafana_data:
