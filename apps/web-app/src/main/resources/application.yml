server:
  port: ${TODO_APP_SERVER_PORT:${SERVER_PORT:8080}}
  shutdown: graceful
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  application:
    name: ${TODO_APP_NAME:${APP_NAME:todo-web-app}}
  datasource:
    url: ${TODO_DB_URL:${DB_URL:jdbc:postgresql://${TODO_DB_HOST:localhost}:${TODO_DB_PORT:5432}/${TODO_DB_NAME:todo}}}
    username: ${TODO_DB_USERNAME:${DB_USERNAME:postgres}}
    password: ${TODO_DB_PASSWORD:${DB_PASSWORD:postgres}}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
  lifecycle:
    timeout-per-shutdown-phase: ${TODO_APP_SHUTDOWN_TIMEOUT:20s}
  kafka:
    bootstrap-servers: ${TODO_KAFKA_BOOTSTRAP_SERVERS:${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}

todo:
  kafka:
    enabled: ${TODO_KAFKA_ENABLED:false}
    bootstrap-servers: ${TODO_KAFKA_BOOTSTRAP_SERVERS:${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}}
    consumer-group-id: ${TODO_KAFKA_CONSUMER_GROUP_ID:todo-web-app-reminder-scheduled-v1}
    producer:
      retries: ${TODO_KAFKA_PRODUCER_RETRIES:3}
      retry-backoff: ${TODO_KAFKA_PRODUCER_RETRY_BACKOFF:1s}
      request-timeout: ${TODO_KAFKA_PRODUCER_REQUEST_TIMEOUT:5s}
      delivery-timeout: ${TODO_KAFKA_PRODUCER_DELIVERY_TIMEOUT:20s}
    consumer:
      max-attempts: ${TODO_KAFKA_CONSUMER_MAX_ATTEMPTS:2}
      retry-backoff: ${TODO_KAFKA_CONSUMER_RETRY_BACKOFF:1s}
    outbox:
      batch-size: ${TODO_KAFKA_OUTBOX_BATCH_SIZE:25}
      max-attempts: ${TODO_KAFKA_OUTBOX_MAX_ATTEMPTS:5}
      retry-backoff: ${TODO_KAFKA_OUTBOX_RETRY_BACKOFF:10s}
      processing-timeout: ${TODO_KAFKA_OUTBOX_PROCESSING_TIMEOUT:30s}
      initial-delay: ${TODO_KAFKA_OUTBOX_INITIAL_DELAY:5s}
      fixed-delay: ${TODO_KAFKA_OUTBOX_FIXED_DELAY:10s}
    topics:
      reminder-scheduled-v1: ${TODO_KAFKA_TOPIC_REMINDER_SCHEDULED_V1:todo.reminder.scheduled.v1}
  telegram:
    enabled: ${TODO_TELEGRAM_ENABLED:false}
    base-url: ${TODO_TELEGRAM_BASE_URL:https://api.telegram.org}
    bot-token: ${TODO_TELEGRAM_BOT_TOKEN:}
    connect-timeout: ${TODO_TELEGRAM_CONNECT_TIMEOUT:2s}
    read-timeout: ${TODO_TELEGRAM_READ_TIMEOUT:5s}
  reminder-delivery:
    enabled: ${TODO_REMINDER_DELIVERY_ENABLED:${TODO_TELEGRAM_ENABLED:false}}
    initial-delay-ms: ${TODO_REMINDER_DELIVERY_INITIAL_DELAY_MS:5000}
    fixed-delay-ms: ${TODO_REMINDER_DELIVERY_FIXED_DELAY_MS:30000}
    batch-size: ${TODO_REMINDER_DELIVERY_BATCH_SIZE:25}
    max-attempts: ${TODO_REMINDER_DELIVERY_MAX_ATTEMPTS:3}
    retry-backoff: ${TODO_REMINDER_DELIVERY_RETRY_BACKOFF:30s}
    processing-timeout: ${TODO_REMINDER_DELIVERY_PROCESSING_TIMEOUT:30s}

management:
  endpoint:
    health:
      probes:
        enabled: true

  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
      slo:
        "[http.server.requests]": 100ms,250ms,500ms,1s,2s,5s

  prometheus:
    metrics:
      export:
        enabled: true
