server:
  port: ${SERVER_PORT:8080}
  tomcat:
    mbeanregistry:
      enabled: true

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/todo}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-components: always
      show-details: ${ACTUATOR_HEALTH_SHOW_DETAILS:always}

  metrics:
    tags:
      application: ${APP_NAME:todo-web-app}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 100ms,250ms,500ms,1s,2s,5s

  prometheus:
    metrics:
      export:
        enabled: true
